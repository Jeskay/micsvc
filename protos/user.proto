syntax = "proto3";

package user;

option go_package = "./user";

service Users {
  rpc GetAll (Empty) returns (UsersResponse) {}
  rpc Post (User) returns (StatusResponse) {}
  rpc Update (UpdateRequest) returns (StatusResponse) {}
  rpc Delete (UserKey) returns (StatusResponse) {}
  rpc Login (LoginRequest) returns (LoginResponse) {}
  rpc Register (RegisterUser) returns (StatusResponse) {}
}

message Empty {}

message UserData {
  int32 id = 1;
  string name = 2;
  string surname = 3;
  string email = 4;
}

message User {
  int32 id = 1;
  string name = 2;
  string surname = 3;
  string email = 4;
  string password = 5;
}

message UserKey {
  int32 id = 1;
}

message LoginRequest {
  int32 id = 1;
  string password = 2;
}

message UpdateRequest {
  UserKey key = 1;
  User data = 2;
}

message RegisterUser {
  int32 id = 1;
  string password = 2;
}

message LoginResponse {
  int32 status = 1;
  string token = 2;
}

message UsersResponse {
  repeated UserData users = 1;
}

message StatusResponse {
  int32 code = 1;
}

