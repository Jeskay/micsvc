input {
  syslog {
    port => 12201
    type => "syslog"
  }
}

filter {
  json {
    source => "message"
    remove_field => ["message"]
  }
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  stdout {
    codec => rubydebug
  }
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "app_logs"
  }
}
